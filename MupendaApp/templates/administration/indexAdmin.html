{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{% static 'images/Icone Mupenda.png' %}" type="image/x-icon">
    <title>Administration Mupenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

  <section style="background-color: black;">
    <div class="container py-2">
      <nav class="navbar navbar-expand-lg shadow">
        <div class="container-fluid">
          <a class="navbar-brand" href="{% url 'dashboard' %}"><img src="{% static 'images/White Mupenda Company.png' %}" alt="mupenda" width="150"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation" style="background-color: #ff6700;">
              <span class="navbar-toggler-icon"></span>
            </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav mx-auto">
              <a class="nav-link text-white active" aria-current="page" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> Accueil</a>
              <a class="nav-link text-white" href="{% url 'AdminApropos' %}">A propos</a>
              <a class="nav-link text-white" href="{% url 'AdminBlog' %}">Profil</a>
              <a class="nav-link text-white" href="{% url 'AdminService' %}">Services</a>
              <a class="nav-link text-white" href="{% url 'AdminRealisation' %}">Réalisations</a>
              <a class="nav-link text-white" href="{% url 'AdminFormation' %}">Formations</a>
              <a class="nav-link text-white" href="{% url 'AdminContact' %}">Contacts</a>
              <a class="nav-link text-white" href="{% url 'AdminFaq' %}">FAQ</a>
              <a class="nav-link text-white" href="{% url 'AdminTemoignage' %}">Témoignages</a>
              <a class="nav-link text-white" href="{% url 'AdminPartenaire' %}">Partenaires</a>
              <a class="nav-link text-white" href="{% url 'AdminBlog' %}">Blog</a>
            </div>
            <a class="btn fw-bold" style="background-color: #ff6700; color: black;" href="{% url 'deconnexion' %}">Déconnexion</a>
          </div>
        </div>
      </nav>
    </div> 
  </section>

  <div class="main-content">
    <section class="shadow py-3" style="background-color: #ff6700; color: black">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-12 d-flex justify-content-between align-items-center">
                    <h3 class="fw-bold">Administration</h3>
                    <p class="">Bienvenue, <span class="fw-bold"> {{ user.username }}</span> </p>
                </div>
            </div>
          </div>
        </div>
    </section>
  </div>

  {% block content %}

  {% endblock content %}

  <!-- Pied de la page -->
  <footer class="shadow" style="background-color: black;">
    <p class="text-secondary text-center py-3">Copyright &copy; 2026 mupenda, Tous droits reservés.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>

</body>
</html>
