<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mupenda | Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
</head>
  <body class="">


    <div class="container mt-5">
      <div class="row mt-5">
        <div class="col-md-6 mx-auto mt-5">
          <form class="form form-control mt-5 shadow p-5" action="{% url 'connexion' %}" method="post">
              {% csrf_token %}
              <h2 class="text-center fw-semibold mb-3"><i class="bi bi-backpack"></i> Connectez - vous!</h2>
          
              <p class="text-danger">{{ erreur }}</p>
              
              <div class="mb-3">
                  <label class="form-label" for="username"><i class="bi bi-person-circle"></i> Nom d'utilisateur</label>
                  <input class="form-control" type="text" name="username" required>
              </div>
              <div class="mb-3">
                  <label class="form-label" for="password"><i class="bi bi-key-fill"></i> Mot de passe</label>
                  <input class="form-control" type="password" name="password" required>
              </div>
              <button class="btn form-control fw-semibold mt-3" type="submit"><i class="bi bi-backpack"></i> Se connecter</button>
          </form>
        </div>
      </div>
        <p class="fw-semibold mt-3 text-center">Pas encore inscrit? <a class="link" href="{% url 'inscription' %}">S'inscrire</a></p>
        <p class="fw-semibold mt-3 text-center">Mot de passe oublié? <a class="link" href="">Réinitialiser le mot de passe</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
