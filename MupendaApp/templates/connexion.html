{% extends 'base.html' %}
{% load static %}
{% block content %}

    <div class="container my-5">
      <div class="row my-5">
        <div class="col-md-5 mx-auto my-5">
          <form class="form form-control mt-5 shadow py-5" action="{% url 'connexion' %}" method="post">
              {% csrf_token %}
              <h2 class="text-center fw-semibold mb-3"><i class="bi bi-backpack"></i> Connectez - vous!</h2>
          
              <p class="text-danger">{{ erreur }}</p>
              
              <div class="mb-3">
                  <label class="form-label" for="username"><i class="bi bi-person-circle"></i> Nom d'utilisateur</label>
                  <input class="form-control" type="text" name="username" required>
              </div>
              <div class="mb-3">
                  <label class="form-label" for="password"><i class="bi bi-key-fill"></i> Mot de passe</label>
                  <input class="form-control" type="password" name="password" required>
              </div>
              <button class="btn form-control fw-bold mt-3" style="background-color: #ff6700; color: black" type="submit"><i class="bi bi-backpack"></i> Se connecter</button>
              <p class="fw-semibold mt-3 text-center">Pas encore inscrit? <a class="link" href="{% url 'inscription' %}">S'inscrire</a></p>
              <p class="fw-semibold mt-3 text-center">Mot de passe oublié? <a class="link" href="">Réinitialiser le mot de passe</a></p>
          </form>
        </div>
      </div>
    </div>
  {% endblock %}
