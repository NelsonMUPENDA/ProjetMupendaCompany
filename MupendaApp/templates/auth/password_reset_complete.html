{% extends 'base.html' %}
{% load static %}

{% block title %}Mot de passe réinitialisé{% endblock %}

{% block content %}
<style>
  .password-reset-complete-page {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
    padding: 3rem 1rem;
  }

  [data-bs-theme="dark"] .password-reset-complete-page {
    background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
  }

  .password-reset-complete-container {
    width: 100%;
    max-width: 500px;
  }

  .password-reset-complete-card {
    background: #ffffff;
    border: 1px solid rgba(255, 103, 0, 0.15);
    border-radius: 20px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    text-align: center;
  }

  [data-bs-theme="dark"] .password-reset-complete-card {
    background: #1a1a1a;
    border-color: rgba(255, 103, 0, 0.2);
  }

  .success-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #28a745 0%, #34ce57 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    color: white;
    font-size: 2.5rem;
    box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3);
    animation: checkmark 0.5s ease-in-out;
  }

  @keyframes checkmark {
    0% { transform: scale(0); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .password-reset-complete-title {
    color: #1a1a2e;
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  [data-bs-theme="dark"] .password-reset-complete-title {
    color: #ffffff;
  }

  .password-reset-complete-message {
    color: #666666;
    margin-bottom: 2rem;
    font-size: 1rem;
    line-height: 1.6;
  }

  [data-bs-theme="dark"] .password-reset-complete-message {
    color: #a0a0a0;
  }

  .btn-login {
    background: linear-gradient(135deg, #ff6700 0%, #ff8533 100%);
    color: white;
    padding: 1rem 2rem;
    border-radius: 12px;
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255, 103, 0, 0.3);
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 103, 0, 0.4);
    color: white;
  }
</style>

<section class="password-reset-complete-page">
  <div class="password-reset-complete-container">
    <div class="password-reset-complete-card">
      <div class="success-icon">
        <i class="bi bi-check-lg"></i>
      </div>
      
      <h1 class="password-reset-complete-title">Mot de passe changé !</h1>
      <p class="password-reset-complete-message">
        Votre mot de passe a été réinitialisé avec succès. 
        Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
      </p>

      <a href="{% url 'connexion' %}" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i>
        Se connecter
      </a>
    </div>
  </div>
</section>
{% endblock %}
