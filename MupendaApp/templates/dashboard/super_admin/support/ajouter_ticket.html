{% extends 'dashboard/base_super_admin.html' %}
{% load static %}

{% block title %}Ajouter Ticket{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Nouveau Ticket</h1>
        <a href="{% url 'liste_tickets' %}" class="btn btn-secondary">Retour</a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="client" class="form-label">Client *</label>
                            <select class="form-select" id="client" name="client" required>
                                <option value="">Sélectionner un client</option>
                                {% for client in clients %}
                                <option value="{{ client.id }}">{{ client.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="projet" class="form-label">Projet concerné</label>
                            <select class="form-select" id="projet" name="projet">
                                <option value="">Aucun</option>
                                {% for projet in projets %}
                                <option value="{{ projet.id }}">{{ projet.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="titre" class="form-label">Titre *</label>
                            <input type="text" class="form-control" id="titre" name="titre" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="type_demande" class="form-label">Type</label>
                                <select class="form-select" id="type_demande" name="type_demande">
                                    {% for value, label in type_choices %}
                                    <option value="{{ value }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="priorite" class="form-label">Priorité</label>
                                <select class="form-select" id="priorite" name="priorite">
                                    {% for value, label in priorite_choices %}
                                    <option value="{{ value }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'liste_tickets' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Créer le ticket</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
