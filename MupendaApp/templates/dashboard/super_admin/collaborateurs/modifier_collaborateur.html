{% extends 'dashboard/base_super_admin.html' %}
{% load static %}

{% block title %}Modifier Collaborateur{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Modifier {{ collaborateur.user.get_full_name|default:collaborateur.user.username }}</h1>
        <a href="{% url 'fiche_collaborateur' collaborateur.id %}" class="btn btn-secondary">Retour</a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="poste" class="form-label">Poste</label>
                            <select class="form-select" id="poste" name="poste">
                                <option value="">Sélectionner...</option>
                                {% for value, label in poste_choices %}
                                <option value="{{ value }}" {% if collaborateur.poste == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="tjm" class="form-label">TJM (€)</label>
                                <input type="number" step="0.01" class="form-control" id="tjm" name="tjm" value="{{ collaborateur.tjm|default:'' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="cout_horaire" class="form-label">Coût horaire (€)</label>
                                <input type="number" step="0.01" class="form-control" id="cout_horaire" name="cout_horaire" value="{{ collaborateur.cout_horaire|default:'' }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="disponibilite" class="form-label">Disponibilité</label>
                            <select class="form-select" id="disponibilite" name="disponibilite">
                                {% for value, label in dispo_choices %}
                                <option value="{{ value }}" {% if collaborateur.disponibilite == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="competences" class="form-label">Compétences</label>
                            <textarea class="form-control" id="competences" name="competences" rows="3">{{ collaborateur.competences|default:'' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="telephone" class="form-label">Téléphone</label>
                            <input type="tel" class="form-control" id="telephone" name="telephone" value="{{ collaborateur.telephone|default:'' }}">
                        </div>
                        <div class="mb-3">
                            <label for="linkedin" class="form-label">LinkedIn</label>
                            <input type="url" class="form-control" id="linkedin" name="linkedin" value="{{ collaborateur.linkedin|default:'' }}" placeholder="https://linkedin.com/in/...">
                        </div>
                        <div class="mb-3 form-check">
                            <input class="form-check-input" type="checkbox" id="actif" name="actif" {% if collaborateur.actif %}checked{% endif %}>
                            <label class="form-check-label" for="actif">Actif</label>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'fiche_collaborateur' collaborateur.id %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
