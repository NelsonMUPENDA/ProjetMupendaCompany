{% extends 'dashboard/base_super_admin.html' %}
{% load static %}

{% block title %}Ajouter Devis{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Ajouter un Devis</h1>
        <a href="{% url 'liste_devis' %}" class="btn btn-secondary">Retour</a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="client" class="form-label">Client *</label>
                            <select class="form-select" id="client" name="client" required>
                                <option value="">Sélectionner un client</option>
                                {% for client in clients %}
                                <option value="{{ client.id }}">{{ client.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="projet" class="form-label">Projet (optionnel)</label>
                            <select class="form-select" id="projet" name="projet">
                                <option value="">Sélectionner un projet</option>
                                {% for projet in projets %}
                                <option value="{{ projet.id }}">{{ projet.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="date_validite" class="form-label">Date de validité</label>
                            <input type="date" class="form-control" id="date_validite" name="date_validite">
                        </div>
                        <div class="mb-3">
                            <label for="montant_ht" class="form-label">Montant HT (€) *</label>
                            <input type="number" step="0.01" class="form-control" id="montant_ht" name="montant_ht" required>
                        </div>
                        <div class="mb-3">
                            <label for="montant_tva" class="form-label">Montant TVA (€)</label>
                            <input type="number" step="0.01" class="form-control" id="montant_tva" name="montant_tva" value="0">
                        </div>
                        <div class="mb-3">
                            <label for="conditions_paiement" class="form-label">Conditions de paiement</label>
                            <input type="text" class="form-control" id="conditions_paiement" name="conditions_paiement" value="Paiement à 30 jours">
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'liste_devis' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Créer le devis</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
