{% extends 'dashboard/base_super_admin.html' %}
{% load static %}

{% block title %}Modifier Réalisation{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Modifier la Réalisation</h1>
        <a href="{% url 'AdminRealisation' %}" class="btn btn-secondary">Retour</a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="nom" class="form-label">Titre</label>
                            <input type="text" class="form-control" id="nom" name="nom" value="{{ edit.titre }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4">{{ edit.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label for="image" class="form-label">Image</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/*">
                            {% if edit.image %}
                            <p class="mt-2">Image actuelle: <a href="{{ edit.image.url }}" target="_blank">Voir</a></p>
                            {% endif %}
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'AdminRealisation' %}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
