<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mupenda | Inscription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
  </head>
  <body>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 mt-5 mx-auto">
                <form class="form-control p-5 shadow" action="{% url 'inscription' %}" method="post">
                    {% csrf_token %}
                    <h1 class="text-center fw-semibold">S'inscrire</h1>
                    {{ form.as_p }}
                    <button class="btn form-control mt-3 fw-semibold my-2 py-2" type="submit">S'inscrire</button>
                    <p class="text-center mt-3">Vous avez déjà un compte ? <a class="fw-semibold" title="Se connecter" href="{% url 'connexion' %}">Se connecter</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
</body>
</html>
